<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form Demo</title>
    <style>
      .container {
        width: 80%;
        min-height: 100px;
        margin: auto;
        border: 1px solid #000;
        padding: 10px;
      }
      .container h1 {
        text-align: center;
      }
      .container table {
        width: 600px;
        margin: auto;
        border-collapse: collapse;
      }
      .container table,
      tr,
      td {
        border: 1px solid #000;
        padding: 6px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <form>
        <h1>Student Registration Form</h1>
        <table>
          <tr>
            <td>
              <label for="name">Fullname</label>
            </td>
            <td>
              <input
                type="text"
                placeholder="Enter fullname here"
                id="name"
                name="name"
                autocomplete="off"
                required
                readonly
                value="abc"
              />
            </td>
          </tr>

          <tr>
            <td></td>
            <td>
              <button>Register</button>
            </td>
          </tr>
        </table>
      </form>
    </div>
  </body>
</html>
