<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Image Mapping</title>
  </head>
  <body>
    <div>
      <img src="imgs/workplace.jpg" alt="images" usemap="#mymap" />
      <map name="mymap">
        <area
          shape="rect"
          coords="47,51,265,342"
          href="https://shorturl.at/1pWmV"
          target="_blank"
        />

        <area
          shape="circle"
          coords="337,298,47"
          href="https://shorturl.at/qXFvU"
          target="_blank"
        />
      </map>
    </div>
  </body>
</html>
