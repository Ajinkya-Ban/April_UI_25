<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      .box {
        width: 400px;
        height: 300px;
        margin: 160px auto;
        /* border: 1px solid #000; */
        border-width: 10px;
        border-style: solid;
        border-color: black;
        border-left-color: crimson;
        border-right-color: orange;
        /* border-top: none; */
        border-bottom-left-radius: 40%;
        border-top-right-radius: 30%;
      }
      .text {
        width: 100%;
        height: 300px;
      }
      .text p {
        padding: 10px;
        margin-top: 50px;
      }
    </style>
  </head>
  <body>
    <div class="box">
      <div class="text">
        <p>
          Lorem ipsum dolor sit amet consectetur adipisicing elit. Repellat
          velit reprehenderit, maiores maxime fuga deleniti officia aliquid,
          asperiores laudantium odio fugit numquam, laborum quaerat optio id
          similique! Veritatis, quasi quibusdam.
        </p>
      </div>
    </div>
  </body>
</html>
