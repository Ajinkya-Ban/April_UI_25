<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>User Form</title>
    <link rel="stylesheet" href="css/form.css" />
  </head>
  <body>
    <center>
      <form>
        <table border="2" cellpadding="10" cellspacing="0" width="80%">
          <tr bgcolor="lightyellow">
            <th colspan="3"><font color="brown" size="6">User Form</font></th>
          </tr>

          <tr bgcolor="skyblue">
            <td>Enter Name</td>
            <td colspan="2"><input type="text" /></td>
          </tr>

          <tr bgcolor="skyblue">
            <td>Enter Password</td>
            <td colspan="2"><input type="password" /></td>
          </tr>

          <tr bgcolor="skyblue">
            <td>Enter Address</td>
            <td colspan="2"><textarea rows="3" cols="40"></textarea></td>
          </tr>

          <tr bgcolor="skyblue">
            <td>Select Game</td>
            <td colspan="2">
              <input type="checkbox" /> Hockey<br />
              <input type="checkbox" /> Football<br />
              <input type="checkbox" /> Badminton<br />
              <input type="checkbox" /> Cricket<br />
              <input type="checkbox" /> Volleyball
            </td>
          </tr>

          <tr bgcolor="skyblue">
            <td>Gender</td>
            <td colspan="2">
              <input type="radio" name="gender" /> Male
              <input type="radio" name="gender" /> Female
            </td>
          </tr>

          <tr bgcolor="skyblue">
            <td>Select ur age</td>
            <td colspan="2">
              <select>
                <option>select</option>
                <option>10-20</option>
                <option>21-30</option>
                <option>31-40</option>
              </select>
            </td>
          </tr>

          <tr bgcolor="skyblue">
            <td colspan="1"></td>
            <td colspan="2">
              <input type="file" />
            </td>
          </tr>

          <tr bgcolor="skyblue">
            <td colspan="1"></td>
            <td><input type="button" value="Click Me" /></td>
            <td>
              <input type="reset" value="Reset" />
              <input type="submit" value="Submit Form" />
            </td>
          </tr>
        </table>
      </form>
    </center>
  </body>
</html>
