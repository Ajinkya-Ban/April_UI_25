<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      .container {
        width: 80%;
        height: 600px;
        margin: auto;
      }
      .container .imgs {
        width: 100%;
        height: 600px;
      }
      .imgs img {
        width: 100%;
        height: 600px;
        position: relative;
      }
      .text {
        position: absolute;
        top: 40%;
        left: 50%;
        transform: translate(-50%, -50%);
      }
      .text h2 {
        color: white;
        font-size: 4em;
        -webkit-text-stroke: 2px black;
        text-align: center;
      }
      #job {
        display: inline-block;
        text-align: center;
        color: yellow;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="imgs">
        <img src="imgs/nature.jpeg" />
      </div>
      <div class="text">
        <h2>Do hard study and Get a <span id="job">Job..!</span></h2>
      </div>
    </div>
  </body>
</html>
