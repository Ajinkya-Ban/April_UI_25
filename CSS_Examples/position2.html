<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        margin: auto;
      }
      .box {
        width: 400px;
        height: 300px;
        border: 1px solid #000;
        position: relative;
        background-color: black;
      }
      .box1 {
        width: 80px;
        height: 50px;
        background-color: crimson;
        color: white;
        line-height: 50px;
        text-align: center;
        position: absolute;
        /* right: 0;
        bottom: 0; */
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 1;
      }
    </style>
  </head>
  <body>
    <div class="box">
      <div class="box1">Box1</div>
    </div>
  </body>
</html>
